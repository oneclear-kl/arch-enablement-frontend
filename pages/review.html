// ===== 数据模型转换（兼容旧数据） =====
function normalizeReviews(rawReviews) {
  return rawReviews.map(function(r) {
    return Models.Review.create({
      id: r.id,
      demandId: r.demandId,
      status: typeof r.status === 'string' ? Models.Enum.ReviewStatus[r.status.replace(/[\s-]/g, '_').toUpperCase()] || Models.Enum.ReviewStatus.PENDING : (r.status || Models.Enum.ReviewStatus.PENDING),
      reviewers: r.reviewers || [],
      meeting: r.meeting || '',
      deadline: r.deadline || '',
      conclusion: r.conclusion || '',
      checklist: r.checklist || [],
      comments: r.comments || []
    });
  });
}

function getDemand(id){for(var i=0;i<DEMANDS.length;i++){if(DEMANDS[i].id===id)return DEMANDS[i];}return null;}

function renderReview(){
  var sf=document.getElementById('rvStatus').value;
  var rf=document.getElementById('rvReviewer').value;
  var search=document.getElementById('rvSearch').value.trim().toLowerCase();
  var data=reviews.filter(function(r){
    if(sf&&r.status!==sf)return false;
    if(rf&&r.reviewers.indexOf(rf)===-1)return false;
    if(search){
      var d=getDemand(r.demandId);
      if(!d||d.title.toLowerCase().indexOf(search)===-1)return false;
    }
    return true;
  });
  // 更新统计数字（只统计总数，不受过滤影响）
  updateTotalStats();
  var total=data.length;
  var tp=Math.max(1,Math.ceil(total/rvSize));
  if(rvPage>tp)rvPage=tp;
  var start=(rvPage-1)*rvSize;
  var pd=data.slice(start,start+rvSize);
  var tb=document.getElementById('reviewBody');
  var nr=document.getElementById('rvNoResult');
  if(pd.length===0){tb.innerHTML='';nr.style.display='block';}
  else{
    nr.style.display='none';
    var h='';
    for(var i=0;i<pd.length;i++){
      var r=pd[i];
      var d=getDemand(r.demandId);
      var dc=rvColors[r.status]?rvColors[r.status].split('|'):['var(--surface-subtle)','var(--text-tertiary)'];

    if(p===rvPage)ph+='<button class="page-btn active">'+p+'</button>';

  document.getElementById('rvPageBtns').innerHTML=ph;
  // 同步高亮卡片：根据当前 rvStatus 下拉值，高亮对应的统计卡片
  syncStatCardActive();
}

function rvGoPage(p){rvPage=p;renderReview();}

function syncStatCardActive(){
  var currentStatus = document.getElementById('rvStatus').value;
  document.querySelectorAll('.stat-card').forEach(function(card){
    card.classList.remove('active');
  });
  // 根据按钮的 onclick 属性匹配对应的状态
  var cards = document.querySelectorAll('.stat-card');
  for (var i = 0; i < cards.length; i++) {
    var onclick = cards[i].getAttribute('onclick') || '';
    // onclick 格式: filterByStatus(this,'待评审')
    var m = onclick.match(/filterByStatus\(this,'([^']+)'\)/);
    if (m) {
      var cardStatus = m[1];
      var dropdownValue = (cardStatus === '全部' ? '' : cardStatus);
      if (dropdownValue === currentStatus) {
        cards[i].classList.add('active');
        break;
      }
    }
  }
}

function filterByStatus(el, status){
  // 重置分页到第一页
  rvPage = 1;
  // 设置筛选条件：点击「全部」则清空状态筛选
  document.getElementById('rvStatus').value = (status === '全部' ? '' : status);
  // 调用渲染
  renderReview();
  // 高亮卡片：移除所有 active，给当前卡片添加 active
  document.querySelectorAll('.stat-card').forEach(function(card){
    card.classList.remove('active');
  });
  el.classList.add('active');
}

// 更新统计数字（总数，不受过滤影响）
function updateTotalStats(){
  if(!reviews||reviews.length===0){
    document.getElementById('stat 全部').textContent='0';
    document.getElementById('stat 待评审').textContent='0';
    document.getElementById('stat 评审中').textContent='0';
    document.getElementById('stat 已通过').textContent='0';
    document.getElementById('stat 已驳回').textContent='0';
    return;
  }
  var stats={'待评审':0,'评审中':0,'已通过':0,'已驳回':0,'已退回':0};
  for(var i=0;i<reviews.length;i++){
    var r=reviews[i];
    if(r.status&&stats[r.status]!==undefined){
      stats[r.status]++;
    }
  }
  var el1=document.getElementById('stat 全部');
  var el2=document.getElementById('stat 待评审');
  var el3=document.getElementById('stat 评审中');
  var el4=document.getElementById('stat 已通过');
  var el5=document.getElementById('stat 已驳回');
  if(el1){el1.textContent=reviews.length;}
  if(el2){el2.textContent=stats['待评审'];}
  if(el3){el3.textContent=stats['评审中'];}
  if(el4){el4.textContent=stats['已通过'];}
  if(el5){el5.textContent=stats['已驳回'];}
}

function showDemandDropdown(){
  var search=document.getElementById('rvDemandSearch').value.trim().toLowerCase();
  var dropdown=document.getElementById('demandDropdown');
  var pending=DEMANDS.filter(function(d){return d.status==='待评审';});
  if(pending.length===0){
    dropdown.innerHTML='<div style="padding:8px;color:var(--text-tertiary);font-size:12px">暂无待评审需求</div>';
    dropdown.style.display='block';
    return;
  }
  var html='';
  for(var i=0;i<pending.length;i++){
    if(!search||pending[i].id.toLowerCase().indexOf(search)!==-1||pending[i].title.toLowerCase().indexOf(search)!==-1){
      html+='<div style="padding:8px;cursor:pointer;border-bottom:1px solid var(--border-subtle)" onmouseover="this.background=\'var(--surface-subtle)\'" onmouseout="this.background=\'var(--surface-base)\'" onclick="selectDemand(\''+pending[i].id+'\',\''+pending[i].title.replace(/'/g,"\\'")+'\')">'+
        '<div style="font-size:12px;color:var(--brand);font-family:monospace">'+pending[i].id+'</div>'+
        '<div style="font-size:13px;color:var(--text-primary);margin-top:2px">'+pending[i].title+'</div>'+
        '</div>';
    }
  }
  dropdown.innerHTML=html||'<div style="padding:8px;color:var(--text-tertiary);font-size:12px">无匹配需求</div>';
  dropdown.style.display='block';
}

function selectDemand(id,title){
  document.getElementById('rvDemandSearch').value=id+' - '+title;
  document.getElementById('rvDemand').value=id;
  document.getElementById('demandDropdown').style.display='none';
}

function addReviewer(){
  var name=document.getElementById('newReviewer').value.trim();
  if(!name){alert('请输入评审人姓名');return;}
  var list=document.getElementById('reviewersList');
  var label=document.createElement('label');
  label.className='check-row';
  label.style.position='relative';
  label.innerHTML='<input type="checkbox" value="'+name+'" checked> '+name+'<span style="position:absolute;right:-16px;top:-4px;color:var(--text-tertiary);font-size:10px;cursor:pointer" onclick="this.parentElement.remove()">✕</span>';
  list.appendChild(label);
  document.getElementById('newReviewer').value='';
}

function createReview(){
  var did=document.getElementById('rvDemand').value;
  var mt=document.getElementById('rvMeeting').value;
  var dl=document.getElementById('rvDeadline').value;
  var reviewers=[];
  document.querySelectorAll('#modalContent input[type=checkbox]:checked').forEach(function(cb){reviewers.push(cb.value);});
  if(!did){alert('请选择需求');return;}
  if(reviewers.length===0){alert('请选择评审人');return;}
  var n=String(reviews.length+1).padStart(4,'0');
  reviews.unshift({id:'RV-'+n,demandId:did,status:'待评审',reviewers:reviewers,meeting:mt||'待定',deadline:dl||'',conclusion:'',checklist:[{text:'需求完整性',done:false},{text:'技术可行性',done:false},{text:'资源评估',done:false},{text:'排期合理性',done:false}],comments:[]});
  for(var i=0;i<DEMANDS.length;i++){if(DEMANDS[i].id===did){DEMANDS[i].status='评审中';if(!DEMANDS[i].history)DEMANDS[i].history=[];DEMANDS[i].history.push({time:now(),action:'提交评审',user:DEMANDS[i].reporter});break;}}
  closeModal();renderReview();
  toast('评审单 RV-'+n+' 已创建，需求状态已更新为"评审中"','success');
}

  h+='<div style="display:flex;gap:8px;margin-top:12px;align-items:center"><div class="w-7 h-7 rounded-full flex items-center justify-center text-xs flex-shrink-0" style="background:var(--brand-subtle);color:var(--brand)">张</div>'+
    '<input type="text" class="input flex-1" id="rvNewComment" placeholder="输入评论，按 Enter 发送..." style="height:32px" onkeydown="if(event.key===\'Enter\'&&this.value.trim()){addReviewComment(\''+rvId+'\',this.value.trim());this.value=\'\';}">'+
    '<button class="btn btn-primary btn-sm" onclick="var inp=document.getElementById(\'rvNewComment\');if(inp.value.trim()){addReviewComment(\''+rvId+'\',inp.value.trim());inp.value=\'\';}">发送</button></div>';
  h+='</div>';
  document.getElementById('detailPanel').innerHTML=h;
  document.getElementById('detailOverlay').classList.add('show');
}

function switchRTab(el){
  var tabs=el.parentElement.querySelectorAll('.tab');var idx=0;
  for(var i=0;i<tabs.length;i++){tabs[i].classList.toggle('active',tabs[i]===el);if(tabs[i]===el)idx=i;}
  var contents=el.closest('.detail-panel').querySelectorAll('.tab-content');
  for(var i=0;i<contents.length;i++)contents[i].classList.toggle('active',i===idx);
}

function toggleCheck(rvId,idx,chk){var r=reviews.find(function(x){return x.id===rvId;});if(r)r.checklist[idx].done=chk;}

function submitReview(rvId,conclusion){
  var r=reviews.find(function(x){return x.id===rvId;});if(!r)return;
  var tEl=document.getElementById('rvConclusion');
  var t=tEl?tEl.value.trim():'';
  if(!t){alert('请输入评审意见');return;}
  var allDone=r.checklist.every(function(c){return c.done;});
  if(!allDone&&conclusion==='已通过'){if(!confirm('评审清单未完成，确定通过？'))return;}
  r.status=conclusion;r.conclusion=t;
  // 更新所有关联需求的状态
  if(r.demandIds&&r.demandIds.length>0){
    for(var i=0;i<r.demandIds.length;i++){
      for(var j=0;j<DEMANDS.length;j++){
        if(DEMANDS[j].id===r.demandIds[i]){
          if(conclusion==='已通过'){
            DEMANDS[j].status='设计中';
            if(!DEMANDS[j].history)DEMANDS[j].history=[];
            DEMANDS[j].history.push({time:now(),action:'评审通过：'+t,user:'评审组'});
          }else if(conclusion==='已驳回'){
            DEMANDS[j].status='待评审';
            if(!DEMANDS[j].history)DEMANDS[j].history=[];
            DEMANDS[j].history.push({time:now(),action:'评审驳回：'+t,user:'评审组'});
          }else if(conclusion==='已退回'){
            DEMANDS[j].status='待评审';
            if(!DEMANDS[j].history)DEMANDS[j].history=[];
            DEMANDS[j].history.push({time:now(),action:'评审退回：'+t,user:'评审组'});
          }
          break;
        }
      }
    }
  }else if(r.demandId){
    var d=getDemand(r.demandId);
    if(d){
      if(conclusion==='已通过'){d.status='设计中';if(!d.history)d.history=[];d.history.push({time:now(),action:'评审通过：'+t,user:'评审组'});
        // 跨页联动：通知需求台账页面更新状态
        try { localStorage.setItem('demand_status_update', JSON.stringify({demandId: d.id, newStatus: '设计中', timestamp: now()})); } catch(e){}
      }
      else if(conclusion==='已驳回'){d.status='待评审';if(!d.history)d.history=[];d.history.push({time:now(),action:'评审驳回：'+t,user:'评审组'});}
      else if(conclusion==='已退回'){d.status='待评审';if(!d.history)d.history=[];d.history.push({time:now(),action:'评审退回：'+t,user:'评审组'});}
    }
  }
  // 调用 demand.html 的回调函数（如果是批量评审）
  if(typeof onReviewComplete==='function'){onReviewComplete(rvId,conclusion,t);}
  closeDetail();renderReview();
  toast('评审已提交：'+conclusion,conclusion==='已通过'?'success':'warning');
}

function addReviewComment(rvId,text){
  var r=reviews.find(function(x){return x.id===rvId;});if(!r)return;
  if(!r.comments)r.comments=[];
  r.comments.push({user:'张架构',time:new Date().toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(/\//g,'-'),text:text});
  var list=document.getElementById('rvCommentList');
  if(list){
    var html='';
    for(var i=0;i<r.comments.length;i++){
      var c=r.comments[i];
      html+='<div style="padding:10px 0;border-bottom:1px solid var(--border-subtle)"><b style="font-size:12px">'+c.user+'</b> <span style="font-size:10px;color:var(--text-tertiary)">'+c.time+'</span><div style="font-size:12px;color:var(--text-primary);margin-top:2px">'+c.text+'</div></div>';
    }
    list.innerHTML=html;
  }
}

function now(){return new Date().toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}).replace(/\//g,'-');}

// 分配任务：已通过的评审可以指定负责人（单选必填）和成员（多选选填）
function showAssignTask(rvId){
  var r=reviews.find(function(x){return x.id===rvId;});if(!r)return;
  var d=getDemand(r.demandId);if(!d){toast('未找到关联需求','warning');return;}
  
  var members=['张架构','李业务','王技术','赵工程','孙分析','周运维','郑安全','冯环保'];
  var currentAssignee=d.assignee||'';
  // 获取已分配的成员（从demand的members字段或空数组）
  var currentMembers=d.members||[];
  
  var h='<div class="modal-header"><h3>分配任务 - '+r.id+'</h3><div class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></div></div>';
  h+='<div class="modal-body">';
  h+='<div style="background:var(--success-subtle);border-left:3px solid var(--success);border-radius:0 4px 4px 0;padding:10px 12px;margin-bottom:16px">';
  h+='<div style="font-size:12px;color:var(--success);font-weight:600;margin-bottom:4px"><i class="fa-solid fa-check-circle mr-1"></i>评审已通过</div>';
  h+='<div style="font-size:12px;color:var(--text-secondary)"><span style="color:var(--brand);font-family:monospace">'+d.id+'</span> '+d.title+'</div></div>';
  // 负责人（单选，必填）
  h+='<div class="form-group"><label><span class="req">*</span>负责人</label><select class="filter-select" id="assignAssignee" style="height:36px"><option value="">请选择负责人</option>';
  for(var i=0;i<members.length;i++){h+='<option'+(members[i]===currentAssignee?' selected':'')+'>'+members[i]+'</option>';}
  h+='</select><div style="font-size:11px;color:var(--text-tertiary);margin-top:4px">负责人将拥有该需求的全部权限</div></div>';
  // 成员（多选，选填）
  h+='<div class="form-group"><label>成员 <span style="font-size:11px;color:var(--text-tertiary);font-weight:normal">（多选，选填）</span></label><div style="display:flex;flex-wrap:wrap;gap:8px;padding:10px;background:var(--surface-subtle);border-radius:4px">';
  for(var i=0;i<members.length;i++){
    var isChecked=currentMembers.indexOf(members[i])!==-1?'checked':'';
    h+='<label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;background:var(--surface-base);padding:4px 8px;border-radius:4px;border:1px solid var(--border-default)"><input type="checkbox" name="assignMembers" value="'+members[i]+'" '+isChecked+' style="accent-color:var(--brand)">'+members[i]+'</label>';
  }
  h+='</div><div style="font-size:11px;color:var(--text-tertiary);margin-top:4px">成员将拥有装配画布的设计研发权限</div></div>';
  h+='<div class="form-group"><label>评审结论</label><div style="padding:8px 10px;background:var(--surface-subtle);border-radius:4px;font-size:12px;color:var(--text-secondary)">'+r.conclusion+'</div></div>';
  h+='</div>';
  h+='<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveAssignTask(\''+rvId+'\')">保存分配</button></div>';
  
  document.getElementById('modalContent').innerHTML=h;
  document.getElementById('newModal').classList.add('show');
}

function saveAssignTask(rvId){
  var r=reviews.find(function(x){return x.id===rvId;});if(!r)return;
  var d=getDemand(r.demandId);if(!d)return;
  
  var newAssignee=document.getElementById('assignAssignee').value;
  if(!newAssignee){alert('请选择负责人');return;}
  
  // 获取选中的成员
  var selectedMembers=[];
  var memberCbs=document.querySelectorAll('input[name="assignMembers"]:checked');
  for(var i=0;i<memberCbs.length;i++){selectedMembers.push(memberCbs[i].value);}
  
  // 更新需求台账数据
  d.assignee=newAssignee;
  d.members=selectedMembers;
  if(!d.history)d.history=[];
  var memberText=selectedMembers.length>0?'，成员：'+selectedMembers.join('、'):'';
  d.history.push({time:now(),action:'任务分配：负责人→'+newAssignee+memberText,user:'评审组'});
  
  // 赋予负责人和成员装配画布权限（存储到权限表）
  grantAssemblyPermission(d.id,newAssignee,selectedMembers);
  
  closeModal();
  toast('任务已分配给 '+newAssignee+(selectedMembers.length>0?'，成员：'+selectedMembers.join('、'):''),'success');
}

// 赋予装配画布设计研发权限
function grantAssemblyPermission(demandId,assignee,members){
  // 初始化全局权限表
  if(!window.assemblyPermissions)window.assemblyPermissions={};
  // 该需求的权限列表
  window.assemblyPermissions[demandId]={
    owner:assignee,
    members:members||[],
    grantedAt:now()
  };
  console.log('已赋予权限：',demandId,window.assemblyPermissions[demandId]);
}

// 页面加载完成后初始化
window.addEventListener('DOMContentLoaded', function(){
  renderReview();
});
