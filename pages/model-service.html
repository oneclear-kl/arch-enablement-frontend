<style>
/* ===== Layout ===== */
.cap-layout{display:flex;gap:0;height:calc(100vh - 48px - 48px);overflow:hidden}
.cap-left{width:40%;flex-shrink:0;border-right:1px solid var(--border-strong);display:flex;flex-direction:column;overflow:hidden}
.cap-right{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ===== Category Tabs ===== */
.cat-tabs{display:flex;gap:2px;padding:12px 16px 0;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--border-default)}
.cat-tab{padding:8px 14px;font-size:12px;white-space:nowrap;border-radius:8px 8px 0 0;cursor:pointer;transition:all .15s;border:1px solid transparent;border-bottom:none;color:var(--text-tertiary);position:relative;top:1px}
.cat-tab:hover{color:var(--text-primary);background:var(--surface-subtle)}
.cat-tab.active{color:var(--brand);background:var(--surface-base);border-color:var(--border-default);font-weight:600}
.cat-tab i{margin-right:6px;font-size:11px}

/* ===== AI Model List ===== */
.ai-model-list{flex:1;overflow-y:auto;padding:12px 16px}
.ai-model-card{padding:12px 14px;border-radius:10px;border:1px solid var(--border-default);margin-bottom:8px;cursor:pointer;transition:all .15s;background:var(--surface-base);position:relative}
.ai-model-card:hover{border-color:var(--brand);box-shadow:0 2px 8px rgba(99,102,241,.08)}
.ai-model-card.selected{border-color:var(--brand);box-shadow:0 0 0 2px rgba(99,102,241,.15)}
.ai-model-card .model-tag{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface-subtle);color:var(--text-tertiary)}
.ai-model-card .model-metrics{display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--text-tertiary)}
.ai-model-card .model-metrics span{display:flex;align-items:center;gap:4px}

/* ===== Right Panel Tabs ===== */
.right-tabs{display:flex;gap:0;border-bottom:1px solid var(--border-default);flex-shrink:0;padding:0 16px}
.right-tab{padding:10px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;color:var(--text-tertiary)}
.right-tab:hover{color:var(--text-primary)}
.right-tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
.right-tab i{margin-right:6px;font-size:12px}

/* ===== Config Panel ===== */
.config-panel{flex:1;overflow-y:auto;padding:16px 20px}
.config-section{margin-bottom:20px}
.config-section h4{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.config-section h4 i{font-size:12px;color:var(--brand)}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.config-field{display:flex;flex-direction:column;gap:4px}
.config-field label{font-size:11px;color:var(--text-tertiary);font-weight:500}
.config-field .input{font-size:12px;padding:6px 10px}

/* ===== Trigger Conditions ===== */
.trigger-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.trigger-option{padding:10px 12px;border-radius:8px;border:1px solid var(--border-default);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)}
.trigger-option:hover{border-color:var(--brand)}
.trigger-option.selected{background:var(--brand-subtle);border-color:var(--brand);color:var(--brand)}

/* ===== Usage Metrics ===== */
.metric-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.metric-card{padding:12px;border-radius:8px;border:1px solid var(--border-default);text-align:center}
.metric-card .metric-value{font-size:20px;font-weight:700;color:var(--text-primary)}
.metric-card .metric-label{font-size:10px;color:var(--text-tertiary);margin-top:2px}
.metric-card .metric-icon{font-size:18px;margin-bottom:4px}

/* ===== Daily Chart ===== */
.chart-area{padding:12px;border-radius:8px;border:1px solid var(--border-default);margin-bottom:16px}
.chart-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.chart-bar{height:20px;border-radius:4px;min-width:4px;transition:width .4s}
.chart-bar.brand{background:var(--brand)}
.chart-bar.green{background:var(--success)}
.chart-label{font-size:11px;color:var(--text-tertiary);width:40px;flex-shrink:0;text-align:right}
.chart-val{font-size:11px;color:var(--text-secondary);width:36px;flex-shrink:0;text-align:right}

/* ===== CB Status ===== */
.cb-indicator{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:14px}
.cb-indicator.closed{background:var(--success-subtle);color:var(--success)}
.cb-indicator.open{background:oklch(92% 0.08 25);color:var(--danger)}
.cb-indicator.half_open{background:oklch(94% 0.09 85);color:var(--amber)}
.cb-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.cb-dot.closed{background:var(--success)}
.cb-dot.open{background:var(--danger)}
.cb-dot.half_open{background:var(--amber)}

/* ===== Degradation Table ===== */
.degradation-table{width:100%;border-collapse:collapse;font-size:12px}
.degradation-table th{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border-default);color:var(--text-tertiary);font-weight:500}
.degradation-table td{padding:8px 10px;border-bottom:1px solid var(--border-subtle);color:var(--text-secondary)}
.degradation-table tr:hover td{background:var(--surface-subtle)}

/* ===== Billing ===== */
.billing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.billing-card{padding:12px;border-radius:8px;border:1px solid var(--border-default);text-align:center}
.billing-card .bill-value{font-size:18px;font-weight:700;color:var(--text-primary)}
.billing-card .bill-label{font-size:10px;color:var(--text-tertiary);margin-top:2px}

/* ===== No Selection ===== */
.no-selection{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);gap:8px}
.no-selection i{font-size:40px;opacity:.3}
.no-selection p{font-size:13px}

/* ===== Selected Model Header ===== */
.selected-model-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--surface-subtle);margin-bottom:16px}
.selected-model-header .sm-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0}
.selected-model-header .sm-info{flex:1}
.selected-model-header .sm-name{font-size:14px;font-weight:600;color:var(--text-primary)}
.selected-model-header .sm-meta{font-size:11px;color:var(--text-tertiary)}

/* ===== Action Buttons Row ===== */
.action-row{display:flex;gap:8px;margin-top:16px}

/* ===== Invocation Log ===== */
.invocation-log td{font-size:11px;padding:6px 8px}
.invocation-log th{font-size:10px;padding:6px 8px}

/* ===== Category Label ===== */
.cat-label{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface-subtle);color:var(--text-tertiary);display:inline-block}

/* Scrollbar */
.ai-model-list::-webkit-scrollbar,.config-panel::-webkit-scrollbar{width:4px}
.ai-model-list::-webkit-scrollbar-thumb,.config-panel::-webkit-scrollbar-thumb{background:var(--border-default);border-radius:4px}
</style>

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  var colors = { info:'var(--brand)', success:'var(--success)', warn:'var(--amber)', error:'var(--danger)' };
  var icons = { info:'fa-circle-info', success:'fa-check-circle', warn:'fa-exclamation-circle', error:'fa-xmark-circle' };
  var el = document.createElement('div');
  el.className = 'flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-sm text-white anim-fade-up';
  el.style.background = colors[type] || colors.info;
  el.style.minWidth = '240px';
  el.innerHTML = '<i class="fa-solid '+ (icons[type]||icons.info) +'"></i> ' + msg;
  container.appendChild(el);
  setTimeout(function() { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(function() { el.remove(); }, 400); }, 2500);
}

// ============================================================
// CATEGORY TABS
// ============================================================
function renderCategoryTabs() {
  var tabs = document.getElementById('categoryTabs');
  var html = '';
  for (var i = 0; i < CAPABILITY_CATEGORIES.length; i++) {
    var c = CAPABILITY_CATEGORIES[i];
    var active = c.id === selectedCategory ? ' active' : '';
    html += '<div class="cat-tab' + active + '" onclick="switchCategory(\'' + c.id + '\')"><i class="fa-solid ' + c.icon + '"></i>' + c.name + '</div>';
  }
  tabs.innerHTML = html;
  // Build ALL_DOMAINS
  allDomains = ['全部'];
  for (var i = 0; i < CAPABILITY_CATEGORIES.length; i++) {
    allDomains.push(CAPABILITY_CATEGORIES[i].name);
  }
}

function switchCategory(catId) {
  selectedCategory = catId;
  renderCategoryTabs();
  renderModelList(catId);
  // Clear selection if model not in this category
  if (selectedModelId) {
    var found = false;
    for (var i = 0; i < AI_MODELS.length; i++) {
      if (AI_MODELS[i].id === selectedModelId && AI_MODELS[i].cat === catId) { found = true; break; }
    }
    if (!found) {
      selectedModelId = null;
      renderRightContent();
    }
  }
}

// ============================================================
// AI MODEL LIST
// ============================================================
function renderModelList(catId) {
  var list = document.getElementById('aiModelList');
  var models = AI_MODELS.filter(function(m) { return m.cat === catId; });
  if (models.length === 0) {
    list.innerHTML = '<div class="text-center py-12" style="color:var(--text-tertiary)"><i class="fa-solid fa-robot text-3xl mb-3"></i><div class="text-sm">该分类暂无智能能力</div></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < models.length; i++) {
    var m = models[i];
    var selected = m.id === selectedModelId ? ' selected' : '';
    var introduced = introducedModelIds.indexOf(m.id) >= 0;
    var statusDot = m.status === 'published' ? 'var(--success)' : 'var(--amber)';
    html += '<div class="ai-model-card' + selected + '" onclick="selectModel(\'' + m.id + '\')">';
    html += '  <div class="flex items-center gap-3">';
    html += '    <div class="w-8 h-8 rounded flex items-center justify-center text-white text-xs" style="background:' + m.color + '"><i class="fa-solid ' + m.icon + '"></i></div>';
    html += '    <div style="flex:1;min-width:0">';
    html += '      <div class="flex items-center gap-2"><span class="text-sm font-medium" style="color:var(--text-primary)">' + m.name + '</span><span class="badge" style="background:' + statusDot + '20;color:' + statusDot + ';font-size:9px;padding:1px 6px">' + (m.status==='published'?'已发布':'草稿') + '</span></div>';
    html += '      <div class="flex items-center gap-2 mt-1"><span class="model-tag">' + m.type + '</span><span class="model-tag">' + m.algorithm + '</span><span class="model-tag">' + m.version + '</span></div>';
    html += '    </div>';
    html += '    <div style="flex-shrink:0">';
    if (introduced) { html += '<span class="badge" style="background:var(--success-subtle);color:var(--success);font-size:10px"><i class="fa-solid fa-check mr-1"></i>已引入</span>'; }
    html += '    </div>';
    html += '  </div>';
    html += '  <div class="model-metrics">';
    html += '    <span><i class="fa-solid fa-bolt" style="color:var(--brand)"></i>' + m.latency + 'ms</span>';
    html += '    <span><i class="fa-solid fa-arrow-up-wide-short" style="color:var(--success)"></i>' + m.throughput + '/s</span>';
    html += '    <span><i class="fa-solid fa-chart-bar" style="color:var(--amber)"></i>' + formatNum(m.invocations) + '次</span>';
    html += '  </div>';
    html += '</div>';
  }
  list.innerHTML = html;
}

function formatNum(n) {
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toString();
}

// ============================================================
// MODEL SELECTION
// ============================================================
function selectModel(modelId) {
  selectedModelId = modelId;
  renderModelList(selectedCategory);
  renderRightContent();
}

function getSelectedModel() {
  if (!selectedModelId) return null;
  for (var i = 0; i < AI_MODELS.length; i++) {
    if (AI_MODELS[i].id === selectedModelId) return AI_MODELS[i];
  }
  return null;
}

// ============================================================
// RIGHT TABS
// ============================================================
function switchRightTab(tab) {
  currentRightTab = tab;
  var allTabs = document.querySelectorAll('.right-tab');
  for (var i = 0; i < allTabs.length; i++) { allTabs[i].classList.remove('active'); }
  document.querySelector('.right-tab[data-tab="' + tab + '"]').classList.add('active');
  renderRightContent();
}

// ============================================================
// RENDER RIGHT CONTENT
// ============================================================
function renderRightContent() {
  var panel = document.getElementById('configPanel');
  var model = getSelectedModel();
  if (!model) {
    panel.innerHTML = '<div class="no-selection"><i class="fa-regular fa-hand-pointer"></i><p>请从左侧选择一个 AI 智能能力查看详情</p></div>';
    return;
  }
  if (currentRightTab === 'intro') { panel.innerHTML = renderIntroTab(model); }
  else if (currentRightTab === 'monitor') { panel.innerHTML = renderMonitorTab(model); }
  else if (currentRightTab === 'cb') { panel.innerHTML = renderCbTab(model); }
}

  var maxVal = 1;
  for (var i = 0; i < dailyCalls.length; i++) { if (dailyCalls[i] > maxVal) maxVal = dailyCalls[i]; }
  for (var i = 0; i < dailyCalls.length; i++) {
    var pct = Math.round(dailyCalls[i] / maxVal * 100);
    var barColor = i === dailyCalls.length - 1 ? 'brand' : 'brand';
    html += '<div class="chart-row"><div class="chart-label">' + dailyLabels[i] + '</div><div class="flex-1" style="background:var(--surface-subtle);border-radius:4px;height:20px;position:relative"><div class="chart-bar ' + barColor + '" style="width:' + pct + '%"></div></div><div class="chart-val">' + dailyCalls[i] + '</div></div>';
  }
  html += '</div></div>';
  // Billing
  html += '<div class="config-section"><h4><i class="fa-solid fa-coins"></i>计费信息</h4><div class="billing-grid">';
  html += '  <div class="billing-card"><div class="bill-value" style="color:var(--brand)">¥' + perCallPrice.toFixed(4) + '</div><div class="bill-label">单次调用价格</div></div>';
  html += '  <div class="billing-card"><div class="bill-value" style="color:var(--success)">¥' + monthCost + '</div><div class="bill-label">本月费用</div></div>';
  html += '  <div class="billing-card"><div class="bill-value" style="color:var(--amber)">¥' + budgetAlert + '</div><div class="bill-label">预算告警阈值</div></div>';
  html += '</div></div>';
  // Invocation Log
  html += '<div class="config-section"><h4><i class="fa-solid fa-list"></i>最近调用记录</h4>';
  html += '<table class="data-table invocation-log"><thead><tr><th>调用时间</th><th>耗时(ms)</th><th>状态</th><th>费用(¥)</th></tr></thead><tbody id="invocationLogBody">';
  var logs = getInvocationLogFor(model.id);
  for (var i = 0; i < logs.length; i++) {
    var l = logs[i];
    var statusColor = l.status === '成功' ? 'var(--success)' : (l.status === '超时' ? 'var(--amber)' : 'var(--danger)');
    html += '<tr><td>' + l.time + '</td><td>' + l.duration + '</td><td><span style="color:' + statusColor + '">' + l.status + '</span></td><td>' + l.cost.toFixed(4) + '</td></tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

// ============================================================
// TAB 3: 降级熔断
// ============================================================
function renderCbTab(model) {
  var status = cbState.status;
  var statusClass = status.toLowerCase();
  var statusText = status === 'CLOSED' ? '正常 (CLOSED)' : (status === 'OPEN' ? '已熔断 (OPEN)' : '半开 (HALF_OPEN)');
  var html = '';
  // CB Status Indicator
  html += '<div class="config-section"><h4><i class="fa-solid fa-shield-halved"></i>熔断器状态</h4>';
  html += '<div class="cb-indicator ' + statusClass + '"><span class="cb-dot ' + statusClass + '"></span>' + statusText + '</div>';
  html += '</div>';
  // CB Config
  html += '<div class="config-section"><h4><i class="fa-solid fa-gear"></i>熔断参数配置</h4><div class="config-grid">';
  html += '  <div class="config-field"><label>失败阈值 (X of Y)</label><div class="flex gap-2"><input type="number" class="input" id="cbFailureX" value="' + cbState.failureThreshold + '" min="1" max="20" style="width:60px"><span style="display:flex;align-items:center;color:var(--text-tertiary);font-size:12px">of</span><input type="number" class="input" id="cbFailureY" value="' + cbState.failureWindow + '" min="1" max="50" style="width:60px"></div></div>';
  html += '  <div class="config-field"><label>超时阈值 (ms)</label><input type="number" class="input" id="cbTimeout" value="' + cbState.timeout + '" min="100" max="30000" step="100"></div>';
  html += '  <div class="config-field"><label>半开重试间隔 (s)</label><input type="number" class="input" id="cbRetryInterval" value="' + cbState.halfOpenInterval + '" min="5" max="300" step="5"></div>';
  html += '  <div class="config-field"><label>降级策略</label><select class="input" id="cbFallback">';
  var fallbacks = [
    {v:'default',l:'返回默认值'},
    {v:'cache',l:'使用缓存数据'},
    {v:'fallback_model',l:'使用备用模型'},
    {v:'skip',l:'跳过该节点'}
  ];
  for (var i = 0; i < fallbacks.length; i++) {
    var sel = fallbacks[i].v === cbState.fallback ? 'selected' : '';
    html += '<option value="' + fallbacks[i].v + '" ' + sel + '>' + fallbacks[i].l + '</option>';
  }
  html += '  </select></div>';
  html += '</div></div>';
  // Action buttons
  html += '<div class="action-row mb-4">';
  html += '  <button class="btn btn-danger-text btn-sm" onclick="manualTrip()"><i class="fa-solid fa-bolt mr-1"></i>手动熔断</button>';
  html += '  <button class="btn btn-success-text btn-sm" onclick="manualRecover()"><i class="fa-solid fa-heart-circle-check mr-1"></i>手动恢复</button>';
  html += '  <button class="btn btn-primary btn-sm" onclick="saveCbConfig()"><i class="fa-solid fa-floppy-disk mr-1"></i>保存配置</button>';
  html += '</div>';
  // Degradation Records
  html += '<div class="config-section"><h4><i class="fa-solid fa-clock-rotate-left"></i>降级熔断记录</h4>';
  html += '<table class="degradation-table"><thead><tr><th>时间</th><th>原因</th><th>动作</th><th>状态</th></tr></thead><tbody>';
  for (var i = 0; i < degradationRecords.length; i++) {
    var r = degradationRecords[i];
    var statusColor = r.status === '已恢复' ? 'var(--success)' : (r.status === '熔断中' ? 'var(--danger)' : 'var(--amber)');
    html += '<tr><td>' + r.time + '</td><td>' + r.reason + '</td><td><span class="badge" style="background:' + (r.action==='熔断'?'var(--danger)':'var(--amber)') + '20;color:' + (r.action==='熔断'?'var(--danger)':'var(--amber)') + ';font-size:10px">' + r.action + '</span></td><td style="color:' + statusColor + '">' + r.status + '</td></tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

// ============================================================
// ACTIONS
// ============================================================
function toggleTrigger(el) {
  el.classList.toggle('selected');
}

function introduceToAssembly() {
  var model = getSelectedModel();
  if (!model) return;
  if (introducedModelIds.indexOf(model.id) >= 0) {
    showToast('该能力已在编排中', 'warn');
    return;
  }
  introducedModelIds.push(model.id);
  showToast('"' + model.name + '" 已成功引入到业务编排', 'success');
  renderModelList(selectedCategory);
  renderRightContent();
  updateStats();
}

function removeFromAssembly() {
  var model = getSelectedModel();
  if (!model) return;
  var idx = introducedModelIds.indexOf(model.id);
  if (idx >= 0) {
    introducedModelIds.splice(idx, 1);
    showToast('"' + model.name + '" 已从编排中移除', 'info');
  }
  renderModelList(selectedCategory);
  renderRightContent();
  updateStats();
}

function testInvoke() {
  var model = getSelectedModel();
  if (!model) return;
  var duration = model.latency + Math.round(Math.random() * 100 - 50);
  var success = Math.random() > 0.15;
  var status = success ? '成功' : (Math.random() > 0.5 ? '超时' : '失败');
  var now = new Date();
  var timeStr = now.getFullYear() + '-' + pad2(now.getMonth()+1) + '-' + pad2(now.getDate()) + ' ' + pad2(now.getHours()) + ':' + pad2(now.getMinutes()) + ':' + pad2(now.getSeconds());
  var price = getModelPrice(model.id);
  // Build mock result
  var mockResults = [
    '{"prediction":[12.3,12.8,13.1,12.9,13.4],"confidence":0.92,"unit":"吨/天"}',
    '{"anomaly_score":0.12,"is_anomaly":false,"drift_level":"normal"}',
    '{"optimal_value":4.2,"optimization_gain":"+15.3%","recommendation":"increase stroke to 5.2"}',
    '{"defects_detected":0,"processing_time":"198ms"}',
    '{"classification":"紧急维护","confidence":0.87,"priority":"P1"}',
    '{"risk_score":0.34,"risk_level":"低","mitigation":"定期巡检"}'
  ];
  var mockResult = mockResults[Math.floor(Math.random() * mockResults.length)];
  showToast('测试调用完成: ' + status + ' (' + duration + 'ms) 结果: ' + mockResult.substring(0, 50) + (mockResult.length>50?'...':''), success ? 'success' : 'warn');
  // Add to invocation log
  invocationLog.push({ modelId:model.id, time:timeStr, duration:duration, status:status, cost:price });
}

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

// ============================================================
// CB ACTIONS
// ============================================================
function manualTrip() {
  if (cbState.status === 'OPEN') { showToast('熔断器已处于开启状态', 'warn'); return; }
  cbState.status = 'OPEN';
  showToast('已手动触发熔断', 'error');
  degradationRecords.unshift({ time:getNow(), reason:'管理员手动触发', action:'熔断', status:'熔断中' });
  renderRightContent();
  updateStats();
}

function manualRecover() {
  if (cbState.status === 'CLOSED') { showToast('熔断器已处于正常状态', 'warn'); return; }
  cbState.status = 'CLOSED';
  cbState.failureCount = 0;
  showToast('熔断器已手动恢复', 'success');
  if (degradationRecords.length > 0 && degradationRecords[0].status === '熔断中') {
    degradationRecords[0].status = '已恢复';
  }
  renderRightContent();
  updateStats();
}

function saveCbConfig() {
  var x = parseInt(document.getElementById('cbFailureX').value) || 5;
  var y = parseInt(document.getElementById('cbFailureY').value) || 10;
  var timeout = parseInt(document.getElementById('cbTimeout').value) || 3000;
  var interval = parseInt(document.getElementById('cbRetryInterval').value) || 30;
  var fallback = document.getElementById('cbFallback').value;
  cbState.failureThreshold = x;
  cbState.failureWindow = y;
  cbState.timeout = timeout;
  cbState.halfOpenInterval = interval;
  cbState.fallback = fallback;
  Scaffold.markStepCompleted('model-service');
  showToast('熔断参数已保存', 'success');
}

function getNow() {
  var d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()) + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
}

// ============================================================
// HELPERS
// ============================================================
function getModelPrice(modelId) {
  var prices = { M001:0.015, M002:0.020, M003:0.012, M004:0.008, M005:0.025, M006:0.005, M007:0.030, M008:0.035, M009:0.028, M010:0.022, M011:0.010, M012:0.006, M013:0.018, M014:0.003, M015:0.050, M016:0.020, M017:0.015, M018:0.025 };
  return prices[modelId] || 0.01;
}

function getInvocationLogFor(modelId) {
  var logs = invocationLog.filter(function(l) { return l.modelId === modelId; });
  if (logs.length === 0) {
    // Generate some fake historical logs
    var now = new Date();
    for (var i = 0; i < 5; i++) {
      var d = new Date(now - i * 3600000 * (Math.random() * 3 + 1));
      var timeStr = d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()) + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
      var dur = Math.round(getSelectedModel().latency + Math.random() * 100 - 30);
      var st = Math.random() > 0.1 ? '成功' : (Math.random() > 0.5 ? '超时' : '失败');
      var price = getModelPrice(modelId);
      logs.push({ modelId:modelId, time:timeStr, duration:dur, status:st, cost:price });
    }
    invocationLog = invocationLog.concat(logs);
  }
  // Return last 5
  return logs.slice(-5);
}

function generateInvocationLog() {
  // Pre-populate some logs for already-introduced models
  for (var i = 0; i < introducedModelIds.length; i++) {
    getInvocationLogFor(introducedModelIds[i]);
  }
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  var total = AI_MODELS.length;
  var introduced = introducedModelIds.length;
  var todayCalls = 0;
  var monthCost = 0;
  for (var i = 0; i < introducedModelIds.length; i++) {
    var mid = introducedModelIds[i];
    for (var j = 0; j < AI_MODELS.length; j++) {
      if (AI_MODELS[j].id === mid) {
        var monthC = Math.round(AI_MODELS[j].invocations * 0.35 + Math.random() * 200);
        todayCalls += Math.round(AI_MODELS[j].invocations * 0.02);
        monthCost += monthC * getModelPrice(mid);
        break;
      }
    }
  }
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statIntroduced').textContent = introduced;
  document.getElementById('statTodayCalls').textContent = formatNum(todayCalls);
  document.getElementById('statMonthCost').textContent = '¥' + monthCost.toFixed(2);
  document.getElementById('statCbOpen').textContent = cbState.status === 'OPEN' ? '1' : '0';
}
</script>
