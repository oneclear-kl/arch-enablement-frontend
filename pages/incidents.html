.incident-critical{border-left:3px solid var(--danger);background:var(--danger-subtle);padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:8px;cursor:pointer;transition:all .12s}
.incident-critical:hover{background:var(--danger-subtle)}
.incident-warning{border-left:3px solid var(--amber);background:var(--warning-subtle);padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:8px;cursor:pointer;transition:all .12s}
.incident-warning:hover{background:var(--warning-subtle)}
.incident-info{border-left:3px solid var(--info);background:var(--info-subtle);padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:8px;cursor:pointer;transition:all .12s}
.incident-info:hover{background:var(--info-subtle)}
.inc-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;white-space:nowrap}
.inc-timeline-node{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-subtle)}
.inc-timeline-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}

var currentPage = 1;
var pageSize = 10;

// ===== 级别/状态辅助 =====
function levelBadge(l){
  if(l==='P1')return '<span class="inc-badge" style="background:var(--danger-subtle);color:var(--danger)"><span class="w-1.5 h-1.5 rounded-full" style="background:var(--danger)"></span>P1 紧急</span>';
  if(l==='P2')return '<span class="inc-badge" style="background:var(--warning-subtle);color:var(--amber)"><span class="w-1.5 h-1.5 rounded-full" style="background:var(--amber)"></span>P2 重要</span>';
  return '<span class="inc-badge" style="background:var(--info-subtle);color:var(--info)"><span class="w-1.5 h-1.5 rounded-full" style="background:var(--info)"></span>P3 一般</span>';
}
function statusBadge(s){
  if(s==='待处理')return '<span class="inc-badge" style="background:var(--danger-subtle);color:var(--danger)"><span class="w-1.5 h-1.5 rounded-full" style="background:var(--danger)"></span>'+s+'</span>';
  if(s==='处理中')return '<span class="inc-badge" style="background:var(--warning-subtle);color:var(--amber)"><span class="w-1.5 h-1.5 rounded-full" style="background:var(--amber)"></span>'+s+'</span>';
  if(s==='已解决')return '<span class="inc-badge" style="background:var(--success-subtle);color:var(--success)"><span class="w-1.5 h-1.5 rounded-full" style="background:var(--success)"></span>'+s+'</span>';
  return '<span class="inc-badge" style="background:var(--surface-subtle);color:var(--text-tertiary)"><span class="w-1.5 h-1.5 rounded-full" style="background:var(--text-tertiary)"></span>'+s+'</span>';
}

// ===== 统计 =====
function updateStats(){
  document.getElementById('incTotal').textContent=INCIDENTS.length;
  document.getElementById('incActive').textContent=INCIDENTS.filter(function(i){return i.status==='待处理'||i.status==='处理中';}).length;
  document.getElementById('incProcessing').textContent=INCIDENTS.filter(function(i){return i.status==='处理中';}).length;
  document.getElementById('incResolved').textContent=INCIDENTS.filter(function(i){return i.status==='已解决'||i.status==='已关闭';}).length;
  // 平均解决时长（模拟）
  document.getElementById('incAvgTime').textContent='2.5h';
}

// ===== 筛选 =====
function getFiltered(){
  var kw=document.getElementById('incSearch').value.trim().toLowerCase();
  var lv=document.getElementById('incLevelFilter').value;
  var st=document.getElementById('incStatusFilter').value;
  var sv=document.getElementById('incServiceFilter').value;
  return INCIDENTS.filter(function(i){
    if(activeFilter==='活跃'&&i.status!=='待处理'&&i.status!=='处理中')return false;
    if(activeFilter==='处理中'&&i.status!=='处理中')return false;
    if(activeFilter==='已解决'&&i.status!=='已解决'&&i.status!=='已关闭')return false;
    if(lv&&i.level!==lv)return false;
    if(st&&i.status!==st)return false;
    if(sv&&i.service!==sv)return false;
    if(kw&&i.id.toLowerCase().indexOf(kw)===-1&&i.desc.toLowerCase().indexOf(kw)===-1&&i.service.toLowerCase().indexOf(kw)===-1)return false;
    return true;
  });
}
function filterIncidents(){
  var data=getFiltered();
  var total=data.length;
  var tp=Math.max(1,Math.ceil(total/pageSize));
  if(currentPage>tp)currentPage=tp;
  var start=(currentPage-1)*pageSize;
  renderTable(data.slice(start,start+pageSize),total);
}
function filterByStatus(s){
  activeFilter=(activeFilter===s)?null:s;
  currentPage=1;
  filterIncidents();
  document.querySelectorAll('.stat-card .stat-icon-wrap').forEach(function(w){w.parentElement.parentElement.classList.remove('active');});
  if(activeFilter){
    var map={活跃:1,'处理中':2,'已解决':3};
    var idx=map[activeFilter];
    if(idx!==undefined){var c=document.querySelectorAll('.stat-card');if(c[idx])c[idx].classList.add('active');}
  }
}
function resetFilters(){
  document.getElementById('incSearch').value='';
  document.getElementById('incLevelFilter').value='';
  document.getElementById('incStatusFilter').value='';
  document.getElementById('incServiceFilter').value='';
  activeFilter=null;currentPage=1;filterIncidents();
  document.querySelectorAll('.stat-card').forEach(function(c){c.classList.remove('active');});
}

// ===== 表格 =====
function renderTable(data,total){
  var h='';
  for(var i=0;i<data.length;i++){
    var d=data[i];
    h+='<tr class="cursor-pointer" onclick="showDetail(\''+d.id+'\')">';
    h+='<td style="font-family:monospace;color:var(--brand);font-size:12px">'+d.id+'</td>';
    h+='<td><span style="font-size:13px;color:var(--text-primary)">'+d.desc+'</span></td>';
    h+='<td>'+levelBadge(d.level)+'</td>';
    h+='<td>'+statusBadge(d.status)+'</td>';
    h+='<td style="font-family:monospace;font-size:12px;color:var(--text-secondary)">'+d.service+'</td>';
    h+='<td style="font-size:12px;color:var(--text-secondary)">'+(d.assignee||'<span style="color:var(--text-tertiary)">-</span>')+'</td>';
    h+='<td style="font-size:12px;color:var(--text-tertiary)">'+d.foundTime+'</td>';
    h+='<td><a href="javascript:void(0)" class="btn-text mr-1" onclick="event.stopPropagation();showDetail(\''+d.id+'\')">详情</a>';
    if(d.status==='待处理'||d.status==='处理中')h+='<a href="javascript:void(0)" class="btn-text" onclick="event.stopPropagation();showProcess(\''+d.id+'\')">处理</a>';
    h+='</td></tr>';
  }
  document.getElementById('incBody').innerHTML=h;
  document.getElementById('noResult').style.display=data.length===0?'block':'none';
  document.getElementById('pageInfo').textContent='共 '+total+' 条记录';
  document.getElementById('incCount').textContent='共 '+total+' 条';
  renderPagination(total);
}
function renderPagination(total){
  var tp=Math.max(1,Math.ceil(total/pageSize));
  var ph='<button class="px-2 py-1 text-xs border rounded" style="border-color:var(--border-default);color:var(--text-tertiary)" onclick="goPage('+Math.max(1,currentPage-1)+')" '+(currentPage<=1?'disabled':'')+'><i class="fa-solid fa-chevron-left"></i></button>';
  for(var p=Math.max(1,currentPage-2);p<=Math.min(tp,currentPage+2);p++){
    if(p===currentPage)ph+='<button class="px-2.5 py-1 text-xs rounded text-white" style="background:var(--brand)">'+p+'</button>';
    else ph+='<button class="px-2.5 py-1 text-xs border rounded" style="border-color:var(--border-default)" onclick="goPage('+p+')">'+p+'</button>';
  }
  ph+='<button class="px-2 py-1 text-xs border rounded" style="border-color:var(--border-default);color:var(--text-tertiary)" onclick="goPage('+Math.min(tp,currentPage+1)+')" '+(currentPage>=tp?'disabled':'')+'><i class="fa-solid fa-chevron-right"></i></button>';
  document.getElementById('pageBtns').innerHTML=ph;
}
function goPage(p){currentPage=p;filterIncidents();}

// ===== 详情滑入面板 =====
function showDetail(id){
  var d=INCIDENTS.find(function(x){return x.id===id;});
  if(!d)return;
  currentDetail=d;
  var h='<div class="detail-header"><div style="display:flex;align-items:center;gap:10px"><div><div class="text-sm font-semibold" style="color:var(--text-primary)">'+d.id+'</div><div style="font-size:11px;color:var(--text-tertiary)">'+d.service+'</div></div>'+levelBadge(d.level)+statusBadge(d.status)+'</div><div class="modal-close" onclick="closeDetail()"><i class="fa-solid fa-xmark"></i></div></div>';
  h+='<div class="detail-body">';
  h+='<div class="detail-section-title"><i class="fa-solid fa-circle-info" style="color:var(--brand)"></i>基本信息</div>';
  h+='<div class="detail-row"><span class="detail-label">异常描述</span><span class="detail-value">'+d.desc+'</span></div>';
  h+='<div class="detail-row"><span class="detail-label">关联服务</span><span class="detail-value" style="font-family:monospace">'+d.service+'</span></div>';
  h+='<div class="detail-row"><span class="detail-label">SLA</span><span class="detail-value">'+d.sla+'</span></div>';
  h+='<div class="detail-row"><span class="detail-label">发现时间</span><span class="detail-value">'+d.foundTime+'</span></div>';
  h+='<div class="detail-row"><span class="detail-label">处理人</span><span class="detail-value">'+(d.assignee||'<span style="color:var(--text-tertiary)">待分配</span>')+'</span></div>';
  if(d.rootCause){h+='<div class="detail-section-title" style="margin-top:12px"><i class="fa-solid fa-microscope" style="color:var(--amber)"></i>根因分析</div>';
  h+='<div class="detail-row"><span class="detail-label">根因</span><span class="detail-value">'+d.rootCause+'</span></div>';}
  if(d.resolution){h+='<div class="detail-row"><span class="detail-label">解决方案</span><span class="detail-value" style="background:var(--success-subtle);padding:6px 10px;border-radius:4px;color:var(--text-primary)">'+d.resolution+'</span></div>';}
  h+='<div class="detail-section-title" style="margin-top:12px"><i class="fa-solid fa-clock-rotate-left" style="color:var(--info)"></i>处置记录</div>';
  if(d.history)for(var i=0;i<d.history.length;i++){
    var dt=d.history[i];
    h+='<div class="inc-timeline-node"><div class="inc-timeline-dot" style="background:'+(i===0?'var(--danger)':'var(--brand)')+'"></div><div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--text-primary);font-weight:500">'+dt.action+'</span><span style="color:var(--text-tertiary);font-size:11px">'+dt.time+'</span></div><div style="font-size:11px;color:var(--text-tertiary);margin-top:2px">'+dt.user+'</div></div></div>';
  }
  h+='</div>';
  h+='<div style="padding:12px 18px;border-top:1px solid var(--border-subtle);display:flex;gap:8px">';
  if(d.status==='待处理'||d.status==='处理中')h+='<button class="btn btn-primary btn-sm" onclick="closeDetail();setTimeout(function(){showProcess(\''+d.id+'\')},100)"><i class="fa-solid fa-play"></i>处理</button>';
  h+='<button class="btn btn-outline btn-sm" onclick="closeDetail()">关闭</button></div>';
  document.getElementById('detailPanel').innerHTML=h;
  document.getElementById('detailOverlay').classList.add('show');
}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('show');}

// ===== 处理弹窗 =====
function showProcess(id){
  var d=INCIDENTS.find(function(x){return x.id===id;});if(!d)return;
  editingId=id;
  var h='<div class="modal-header"><h3>处理异常 — '+d.id+'</h3><div class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></div></div>';
  h+='<div class="modal-body">';
  h+='<div class="p-3 rounded mb-3" style="background:var(--surface-subtle);font-size:12px"><b style="color:var(--text-primary)">'+d.desc+'</b><div style="color:var(--text-tertiary);margin-top:4px">'+d.service+' · '+d.foundTime+'</div></div>';
  h+='<div class="form-section"><div class="form-section-title"><i class="fa-solid fa-user"></i>处理信息</div>';
  h+='<div class="form-row"><div class="form-group"><label>处理人</label><select class="filter-select" id="pAssignee"><option value="张架构">张架构</option><option value="王技术">王技术</option><option value="赵工程">赵工程</option><option value="孙分析">孙分析</option><option value="李业务">李业务</option><option value="周运维">周运维</option></select></div>';
  h+='<div class="form-group"><label>处理状态</label><select class="filter-select" id="pStatus"><option value="处理中">处理中</option><option value="已解决">已解决</option><option value="已关闭">已关闭</option></select></div></div></div>';
  h+='<div class="form-section"><div class="form-section-title"><i class="fa-solid fa-microscope"></i>根因与方案</div>';
  h+='<div class="form-group"><label>根因分析</label><textarea class="textarea" id="pRootCause" placeholder="描述异常发生的根本原因...">'+(d.rootCause||'')+'</textarea></div>';
  h+='<div class="form-group"><label>解决方案</label><textarea class="textarea" id="pResolution" placeholder="描述采取的解决措施...">'+(d.resolution||'')+'</textarea></div></div>';
  h+='</div>';
  h+='<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveProcess()"><i class="fa-solid fa-check"></i>提交处理</button></div>';
  document.getElementById('processContent').innerHTML=h;
  Scaffold.showModal('processModal');
}
function saveProcess(){
  var d=INCIDENTS.find(function(x){return x.id===editingId;});if(!d)return;
  d.assignee=document.getElementById('pAssignee').value;
  d.status=document.getElementById('pStatus').value;
  d.rootCause=document.getElementById('pRootCause').value.trim()||d.rootCause;
  d.resolution=document.getElementById('pResolution').value.trim()||d.resolution;
  if(!d.history)d.history=[];
  d.history.push({time:new Date().toTimeString().slice(0,5),action:'处理完成: '+d.status,user:d.assignee});
  closeModal();updateStats();filterIncidents();
  toast('异常 '+d.id+' 已更新为「'+d.status+'」','success');
}

// ===== 上报异常 =====
var INCIDENT_TEMPLATES = [
  { label:'服务响应超时', desc:'{service} 响应超时 {time}ms（SLA 阈值: {threshold}ms）', level:'P1', service:'', source:'监控告警' },
  { label:'服务实例异常重启', desc:'{service} 实例异常重启（OOM/进程退出），需排查原因恢复', level:'P2', service:'', source:'监控告警' },
  { label:'数据同步延迟', desc:'{service} 数据同步延迟 >{time}min，需检查同步链路状态', level:'P2', service:'', source:'监控告警' },
  { label:'API 调用失败率上升', desc:'{service} API 调用失败率 {rate}%（阈值 1%），需检查服务健康状态', level:'P1', service:'', source:'监控告警' },
  { label:'磁盘/内存使用率超阈值', desc:'{service} {resource} 使用率 {usage}%（阈值 {threshold}%），需扩容或清理', level:'P3', service:'', source:'监控告警' },
  { label:'证书即将过期', desc:'{service} TLS 证书将于 {days} 天后过期（{expireDate}），需更新证书', level:'P3', service:'', source:'定期巡检' },
  { label:'数据库连接池耗尽', desc:'{service} 数据库连接池使用率 {usage}%，活跃连接数 {active}，需检查连接泄漏', level:'P2', service:'', source:'监控告警' },
  { label:'消息队列积压', desc:'{service} 消息队列积压 {count} 条，消费延迟 {delay}ms，需扩容消费者', level:'P2', service:'', source:'监控告警' }
];
function showReportIncident(){
  var nav=Scaffold.getNavParams();
  var defaultService=nav&&nav.service?nav.service:'';
  var defaultLevel=nav&&nav.level?nav.level:'P2';
  var services=['oilwell-data-api','pressure-predict','sensor-ingest','alarm-dispatcher','auth-gateway','report-gen','log-aggregator','anomaly-detector','data-sync-engine','scheduler-engine','config-center','api-rate-limiter'];
  var h='<div class="modal-header"><h3>上报异常</h3><div class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></div></div>';
  h+='<div class="modal-body">';
  if(nav&&nav.service)h+='<div class="p-3 rounded mb-3" style="background:var(--brand-subtle);font-size:12px;color:var(--brand)"><i class="fa-solid fa-arrow-right mr-1"></i>来自运行监控：'+nav.service+' — '+(nav.desc||'')+'</div>';
  // 预设场景
  h+='<div class="form-section"><div class="form-section-title"><i class="fa-solid fa-list"></i>快速选择场景</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">';
  for(var t=0;t<INCIDENT_TEMPLATES.length;t++){
    (function(tpl){
      h+='<span class="kl-tag domain" style="cursor:pointer;padding:4px 10px;font-size:11px" onclick="applyTemplate('+t+')">'+tpl.label+'</span>';
    })(INCIDENT_TEMPLATES[t]);
  }
  h+='</div></div>';
  h+='<div class="form-section"><div class="form-section-title"><i class="fa-solid fa-circle-exclamation"></i>异常信息</div>';
  h+='<div class="form-group"><label><span class="req">*</span>异常描述</label><textarea class="textarea" id="rDesc" placeholder="描述异常现象" style="height:64px">'+(nav&&nav.desc||'')+'</textarea></div>';
  h+='<div class="form-row"><div class="form-group"><label><span class="req">*</span>关联服务</label><select class="filter-select" id="rService"><option value="">选择服务</option>'+services.map(function(s){return '<option'+(s===defaultService?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div>';
  h+='<div class="form-group"><label>级别</label><select class="filter-select" id="rLevel"><option value="P1" '+(defaultLevel==='P1'?'selected':'')+'>P1 紧急</option><option value="P2" '+(defaultLevel==='P2'?'selected':'')+'>P2 重要</option><option value="P3">P3 一般</option></select></div></div></div>';
  h+='<div class="form-section"><div class="form-section-title"><i class="fa-solid fa-user"></i>处理信息</div>';
  h+='<div class="form-row"><div class="form-group"><label>处理人</label><select class="filter-select" id="rAssignee"><option value="">自动分配</option><option>张架构</option><option>王技术</option><option>赵工程</option><option>孙分析</option><option>李业务</option><option>周运维</option></select></div>';
  h+='<div class="form-group"><label>来源</label><select class="filter-select" id="rSource"><option value="监控告警">监控告警</option><option value="人工上报">人工上报</option><option value="定期巡检">定期巡检</option></select></div></div></div>';
  h+='</div>';
  h+='<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveReport()"><i class="fa-solid fa-plus"></i>提交上报</button></div>';
  document.getElementById('reportContent').innerHTML=h;
  Scaffold.showModal('reportModal');
}
function applyTemplate(idx){
  var tpl=INCIDENT_TEMPLATES[idx];
  var desc=tpl.desc.replace('{service}',document.getElementById('rService').value||'[服务]').replace('{time}','5').replace('{threshold}','2000').replace('{delay}','5000').replace('{count}','50000').replace('{rate}','5.2').replace('{resource}','磁盘').replace('{usage}','92').replace('{threshold}','80').replace('{days}','3').replace('{expireDate}','2026-05-24').replace('{active}','48').replace('{delay}','30000');
  document.getElementById('rDesc').value=desc;
  document.getElementById('rLevel').value=tpl.level;
}
function saveReport(){
  var desc=document.getElementById('rDesc').value.trim();if(!desc){toast('请输入异常描述','warning');return;}
  var service=document.getElementById('rService').value;if(!service){toast('请选择关联服务','warning');return;}
  var level=document.getElementById('rLevel').value;
  var assignee=document.getElementById('rAssignee').value;
  var max=0;INCIDENTS.forEach(function(i){var n=parseInt(i.id.split('-')[1]);if(n>max)max=n;});
  INCIDENTS.unshift({id:'INC-'+String(max+1).padStart(4,'0'),desc:desc,service:service,level:level,status:assignee?'处理中':'待处理',assignee:assignee,foundTime:new Date().toTimeString().slice(0,5),sla:'-',rootCause:'',resolution:'',history:[{time:new Date().toTimeString().slice(0,5),action:'异常上报',user:assignee||'张架构'}]});
  closeModal();updateStats();filterIncidents();toast('异常已上报，编号 INC-'+String(max+1).padStart(4,'0'),'success');
}

// ===== 我的待办 =====
function showMyTasks(){
  var mine=INCIDENTS.filter(function(i){return i.assignee==='张架构'&&(i.status==='待处理'||i.status==='处理中');});
  if(mine.length===0){toast('暂无待办任务','info');return;}
  toast('您有 '+mine.length+' 个待处理异常','info');
}

// ===== 初始化 =====
updateStats();
filterIncidents();
Scaffold.init('incidents');
// 来自监控跳转时自动打开上报弹窗
var _navOnLoad=Scaffold.getNavParams();
if(_navOnLoad&&_navOnLoad.service)setTimeout(function(){showReportIncident();},200);
</script>
</body>
</html>
