.parent-row:hover{background:#F0F5FF!important}
.child-row td:first-child{padding-left:8px}
.child-row{background:#fff}
.child-row td{border-bottom:1px solid #F5F5F5}
.child-indent{display:inline-flex;align-items:center;gap:4px;padding-left:20px;position:relative}
.child-indent::before{content:'';position:absolute;left:8px;top:50%;width:8px;height:1px;background:#D0D0D0}
.expand-btn{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:3px;border:1px solid #D0D8E8;background:#fff;cursor:pointer;color:#666;font-size:10px;flex-shrink:0;cursor:pointer;margin-right:4px}
.expand-btn:hover{background:#E8F0FE;border-color:#4A7DE0;color:#4A7DE0}
.child-count-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:#EEF2FF;color:#4A7DE0;font-size:10px;font-weight:600;margin-left:4px;cursor:pointer}
.btn-add-child{background:none;border:1px dashed #B0C4E8;color:#4A7DE0;padding:0 8px;height:24px;border-radius:4px;font-size:11px;cursor:pointer;white-space:nowrap;}
.btn-add-child:hover{background:#E8F0FE;border-color:#4A7DE0}
.child-badge{display:inline-block;padding:1px 6px;background:#EEF2FF;color:#4A7DE0;border-radius:3px;font-size:10px;margin-right:3px}
.parent-tag{display:inline-block;padding:1px 6px;background:#FFF7E6;color:#FA8C16;border-radius:3px;font-size:10px;margin-right:3px;cursor:pointer}
.parent-tag:hover{background:#FFE7BA}
.check-row{display:flex;align-items:center;gap:6px;padding:4px 0}
.check-row input[type=checkbox]{width:15px;height:15px;accent-color:#4A7DE0}
.timeline-item{display:flex;gap:10px;padding:6px 0}
.timeline-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.timeline-content{flex:1}
.timeline-content .time{font-size:10px;color:#999}
.timeline-content .text{font-size:12px;color:#333}
.text-ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.form-section{margin-bottom:16px}
.form-section-title{font-size:13px;font-weight:600;color:#181818;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.form-section-title i{font-size:11px}
.link-input-group{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.link-input-group .input{flex:1}
.link-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px}
.link-item .link-url{color:#0056D6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-item .link-date{color:#999;flex-shrink:0;font-size:11px}
.link-item .link-remove{color:#ccc;cursor:pointer;flex-shrink:0}
.link-item .link-remove:hover{color:#FF4D4F}

function normalizeDemands(rawDemands) {
  return rawDemands.map(function(d) {
    return Models.Demand.create({
      id: d.id,
      title: d.title,
      type: typeof d.type === 'string' ? Models.Enum.DemandType[d.type.toUpperCase().replace(/[\s-]/g, '_')] || d.type : d.type,
      domain: d.domain,
      priority: typeof d.priority === 'string' ? Models.Enum.Priority[d.priority.toUpperCase()] || d.priority : d.priority,
      status: typeof d.status === 'string' ? Models.Enum.DemandStatus[d.status.replace(/[\s-]/g, '_').toUpperCase()] || d.status : d.status,
      assignee: d.assignee,
      reporter: typeof d.reporter === 'string' ? {name: d.reporter, unit: '', dept: ''} : (d.reporter || {name: '', unit: '', dept: ''}),
      parentId: d.parentId || null,
      source: d.source || Models.Enum.Source.BUSINESS,
      businessBackground: d.businessBackground || d.desc || '',
      userStory: d.userStory || d.desc || '',
      expectedValue: d.expectedValue || d.acceptance || '',
      acceptance: d.acceptance || '',
      desc: d.desc || '',
      iterationType: d.iterationType || Models.Enum.IterationType.NEW,
      iterationNote: d.iterationNote || '',
      version: d.version || '',
      expectedDate: d.expectedDate || '',
      estHours: d.estHours || 0,
      designLink: d.designLink || '',
      devLink: d.devLink || '',
      testLink: d.testLink || '',
      releaseLink: d.releaseLink || '',
      tags: d.tags || [],
      sprint: d.sprint || '',
      created: d.created,
      updated: d.updated,
      history: d.history || [],
      comments: d.comments || []
    });
  });
}

var filtered=demands.slice();
var currentPage=1,pageSize=8,currentView='table';
var selectedIds={},editingId=null;
var expandedParents={};

var pColors={'紧急':'#FFF1F0|#FF4D4F','高':'#FFF1F0|#FF4D4F','中':'#F6FFED|#52C41A','低':'#F0F5FF|#999'};
var sColors={'待评审':'#FFFBE6|#FAAD14','设计中':'#E8F0FE|#4A7DE0','已上线':'#F6FFED|#52C41A','已驳回':'#F5F5F5|#999'};
var typeColors={'场景':'#722ED1|#F9F0FF','模块':'#4A7DE0|#E8F0FE','组件':'#13C2C2|#E6FFFB','数据服务':'#FA8C16|#FFF7E6','模型服务':'#EB2F96|#FFF0F6','其他':'#999|#F5F5F5'};

function getChildren(parentId){return demands.filter(function(d){return d.parentId===parentId;});}
function isParent(d){return !d.parentId;}

function toggleExpand(parentId){
  expandedParents[parentId]=!expandedParents[parentId];
  renderTable();
}

function initExpandState(){
  demands.forEach(function(d){
    if(isParent(d)){
      var ch=getChildren(d.id);
      if(ch.length>0&&expandedParents[d.id]===undefined)expandedParents[d.id]=true;
    }
  });
}

document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeDetail();}});

function switchView(v){
  currentView=v;
  document.querySelectorAll('#viewToggle .vbtn').forEach(function(b){b.classList.toggle('active',b.dataset.view===v);});
  document.getElementById('tableView').style.display=v==='table'?'':'none';
  document.getElementById('kanbanView').style.display=v==='kanban'?'':'none';
  applyFilters();
}

function applyFilters(){
  var t=document.getElementById('filterType').value;
  var d=document.getElementById('filterDomain').value;
  var s=document.getElementById('filterStatus').value;
  var p=document.getElementById('filterPriority').value;
  var q=document.getElementById('filterSearch').value.toLowerCase();
  var matchIds={};
  demands.forEach(function(x){
    var ok=true;
    if(t&&x.type!==t)ok=false;
    if(d&&x.domain!==d)ok=false;
    if(s&&x.status!==s)ok=false;
    if(p&&x.priority!==p)ok=false;
    if(q&&x.id.toLowerCase().indexOf(q)===-1&&x.title.toLowerCase().indexOf(q)===-1)ok=false;
    if(ok)matchIds[x.id]=true;
  });
  demands.forEach(function(x){
    if(matchIds[x.id]){
      if(x.parentId&&!matchIds[x.parentId])matchIds[x.parentId]='parent-by-child';
    }
  });
  demands.forEach(function(x){
    if(matchIds[x.id]==='parent-by-child'||matchIds[x.id]===true){
      if(isParent(x)&&matchIds[x.id]===true&&!t&&!d&&!s&&!p&&!q){
        getChildren(x.id).forEach(function(c){matchIds[c.id]=true;});
      }
    }
  });
  filtered=demands.filter(function(x){return !!matchIds[x.id];});
  if(currentView==='table')renderTable();else renderKanban();
  updateBatchBar();
}

function renderTable(){
  var parentRows=filtered.filter(function(x){return isParent(x);});
  var orphanChildren=filtered.filter(function(x){return !isParent(x)&&!filtered.find(function(p){return p.id===x.parentId;});});
  var rows=[];
  parentRows.forEach(function(x){
    rows.push({data:x,isChild:false});
    var ch=getChildren(x.id).filter(function(c){return filtered.some(function(f){return f.id===c.id;});});
    if(ch.length>0&&expandedParents[x.id]){
      ch.forEach(function(c){rows.push({data:c,isChild:true});});
    }
  });
  orphanChildren.forEach(function(x){rows.push({data:x,isChild:true});});

  var total=rows.length;
  var tp=Math.max(1,Math.ceil(total/pageSize));
  if(currentPage>tp)currentPage=tp;
  var start=(currentPage-1)*pageSize;
  var pd=rows.slice(start,start+pageSize);
  var tb=document.getElementById('tableBody');
  var nr=document.getElementById('noResult');
  if(pd.length===0){tb.innerHTML='';nr.style.display='block';}
  else{
    nr.style.display='none';
    var h='';
    for(var i=0;i<pd.length;i++){
      var row=pd[i];
      var x=row.data;
      var isChild=row.isChild;
      var tc=typeColors[x.type]?typeColors[x.type].split('|'):['#999','#F5F5F5'];
      var children=getChildren(x.id);
      var hasChildren=!isChild&&children.length>0;
      var isExpanded=expandedParents[x.id];
      var rowCls=isChild?'child-row':'parent-row';
      if(selectedIds[x.id])rowCls+=' selected';
      h+='<tr class="'+rowCls+'">';
      h+='<td><input type="checkbox"'+(selectedIds[x.id]?' checked':'')+' onchange="toggleSelect(\''+x.id+'\',this.checked)"></td>';
      if(isChild){
        h+='<td style="color:#999;font-family:monospace;font-size:11px;padding-left:28px">'+x.id+'</td>';
      }else{
        h+='<td style="color:#4A7DE0;font-family:monospace;font-size:11px">'+x.id+'</td>';
      }
      h+='<td>';
      if(isChild){
        h+='<div class="child-indent"><span style="color:#4A7DE0;cursor:pointer;font-size:12px;font-weight:500" onclick="showDetail(\''+x.id+'\')">'+x.title+'</span></div>';
      }else{
        h+='<div style="display:flex;align-items:center;gap:4px">';
        if(hasChildren){
          h+='<span class="expand-btn" onclick="toggleExpand(\''+x.id+'\')" title="'+(isExpanded?'收起':'展开')+'子需求"><i class="fa-solid fa-'+(isExpanded?'chevron-down':'chevron-right')+'" style="font-size:9px"></i></span>';
        }
        h+='<span style="color:#181818;cursor:pointer;font-weight:500;font-size:12px" onclick="showDetail(\''+x.id+'\')">'+x.title+'</span>';
        if(hasChildren){
          h+='<span class="child-count-badge" title="'+children.length+'个子需求" onclick="toggleExpand(\''+x.id+'\')">'+children.length+'</span>';
        }
        h+='</div>';
      }
      h+='</td>';
      h+='<td><span class="tag" style="background:'+tc[1]+';color:'+tc[0]+'">'+x.type+'</span></td>';
      h+='<td style="font-size:11px">'+x.domain+'</td>';
      h+='<td>'+badge(pColors,x.priority)+'</td>';
      h+='<td>'+badge(sColors,x.status)+'</td>';
      h+='<td style="font-size:11px">'+x.assignee+'</td>';
      h+='<td style="font-size:11px">'+(x.estHours?x.estHours+'h':'-')+'</td>';
      h+='<td style="font-size:11px">'+(x.sprint||'-')+'</td>';
      h+='<td style="font-size:11px;color:#999">'+x.created+'</td>';
      var isLocked=(x.status==='已驳回' || x.status==='已上线');
      var canAddChild=(x.status!=='已驳回');
      h+='<td>';
      h+='<a href="javascript:void(0)" class="btn-text mr-1" onclick="showDetail(\''+x.id+'\')">详情</a>';
      if(!isLocked){
        h+='<a href="javascript:void(0)" class="btn-text mr-1" onclick="showEdit(\''+x.id+'\')">编辑</a>';
      }
      if(!isChild && canAddChild){
        h+='<button class="btn-add-child" onclick="showNewChildModal(\''+x.id+'\')"><i class="fa-solid fa-plus" style="font-size:9px;margin-right:2px"></i>子需求</button>';
      }
      h+='</td>';
      h+='</tr>';
    }
    tb.innerHTML=h;
  }
  var totalParents=filtered.filter(function(x){return isParent(x);}).length;
  var totalChildren=filtered.filter(function(x){return !isParent(x);}).length;
  var infoTxt='共 '+parentRows.length+' 条主需求';
  if(totalChildren>0)infoTxt+=('，'+totalChildren+' 条子需求');
  document.getElementById('pageInfo').textContent=infoTxt;
  var ph='<button class="px-2 py-1 text-xs border rounded" style="border-color:#E0E4E8;color:'+(currentPage>1?'#666':'#999')+'" onclick="goPage('+Math.max(1,currentPage-1)+')"'+(currentPage<=1?' disabled':'')+'>«</button>';
  for(var p=1;p<=tp;p++){
    if(p===currentPage)ph+='<button class="px-2.5 py-1 text-xs rounded text-white" style="background:#4A7DE0">'+p+'</button>';
    else ph+='<button class="px-2.5 py-1 text-xs border rounded" style="border-color:#E0E4E8" onclick="goPage('+p+')">'+p+'</button>';
  }
  ph+='<button class="px-2 py-1 text-xs border rounded" style="border-color:#E0E4E8;color:'+(currentPage<tp?'#666':'#999')+'" onclick="goPage('+Math.min(tp,currentPage+1)+')"'+(currentPage>=tp?' disabled':'')+'>»</button>';
  document.getElementById('pageBtns').innerHTML=ph;
}

function renderKanban(){
  var statuses=['待评审','设计中','已上线','已驳回'];
  var sc={'待评审':'#FAAD14','设计中':'#4A7DE0','已上线':'#52C41A','已驳回':'#999'};
  var h='';
  for(var si=0;si<statuses.length;si++){
    var s=statuses[si];
    var items=filtered.filter(function(x){return x.status===s;});
    h+='<div class="kanban-col"><div class="kanban-col-header" style="border-top:3px solid '+sc[s]+'"><span>'+s+'</span><span class="count">'+items.length+'</span></div>';
    if(items.length===0)h+='<div style="padding:16px;text-align:center;color:#ccc;font-size:11px">暂无需求</div>';
    for(var j=0;j<items.length;j++){
      var x=items[j];
      var tc=typeColors[x.type]?typeColors[x.type].split('|'):['#999','#F5F5F5'];
      h+='<div class="kanban-card" onclick="showDetail(\''+x.id+'\')"><div class="kanban-card-title" title="'+x.title+'">'+x.title+'</div><div class="kanban-card-meta"><span class="kanban-card-id">'+x.id+'</span><div style="display:flex;gap:3px"><span class="tag" style="background:'+tc[1]+';color:'+tc[0]+'">'+x.type+'</span>'+badge(pColors,x.priority)+'</div></div></div>';
    }
    h+='</div>';
  }
  document.getElementById('kanbanBoard').innerHTML=h;
}

function goPage(p){currentPage=p;if(currentView==='table')renderTable();}

function toggleSelect(id,chk){if(chk)selectedIds[id]=true;else delete selectedIds[id];updateBatchBar();if(currentView==='table')renderTable();}
function toggleAll(cb){var tp=Math.max(1,Math.ceil(filtered.length/pageSize));if(currentPage>tp)currentPage=tp;var start=(currentPage-1)*pageSize;var pd=filtered.slice(start,start+pageSize);for(var i=0;i<pd.length;i++){if(cb.checked)selectedIds[pd[i].id]=true;else delete selectedIds[pd[i].id];}if(currentView==='table')renderTable();updateBatchBar();}
function clearSelection(){selectedIds={};updateBatchBar();if(currentView==='table')renderTable();}
function updateBatchBar(){var n=Object.keys(selectedIds).length;var bar=document.getElementById('batchBar');if(n>0){bar.classList.add('show');document.getElementById('selCount').textContent='已选 '+n+' 项';}else bar.classList.remove('show');}
function batchAction(action,val){
  var ids=Object.keys(selectedIds);
  if(action==='delete'){if(!confirm('确定删除选中的 '+ids.length+' 条需求？'))return;demands=demands.filter(function(x){return selectedIds[x.id]!==true;});toast('已删除 '+ids.length+' 条','success');}
  else{for(var i=0;i<demands.length;i++){if(selectedIds[demands[i].id])demands[i][action]=val;}toast('已更新 '+ids.length+' 条','success');}
  selectedIds={};applyFilters();
}

function saveChildDemand(parentId){
  var t=document.getElementById('fTitle').value.trim();if(!t){toast('请输入子需求标题','warning');return;}
  var bg=document.getElementById('fBusinessBackground').value.trim();if(!bg){toast('请输入业务背景','warning');return;}
  var us=document.getElementById('fUserStory').value.trim();if(!us){toast('请输入用户故事','warning');return;}
  var ev=document.getElementById('fExpectedValue').value.trim();if(!ev){toast('请输入预期价值','warning');return;}
  var assignee=document.getElementById('fAssignee').value;
  var parent=demands.find(function(d){return d.id===parentId;});
  var siblings=getChildren(parentId);
  var newSuffix=siblings.length+1;
  var newId=parentId+'-'+newSuffix;
  var newDemand={
    id:newId,title:t,type:document.getElementById('fType').value,
    domain:document.getElementById('fDomain').value,priority:document.getElementById('fPriority').value,
    status:'待评审',assignee:assignee,reporter:assignee||'张架构',
    estHours:parseInt(document.getElementById('fHours').value)||0,
    sprint:document.getElementById('fSprint').value,tags:[],
    acceptance:document.getElementById('fAcceptance').value,
    desc:document.getElementById('fDesc').value,
    designLink:'',devLink:'',testLink:'',releaseLink:'',
    parentId:parentId,version:'',
    source:'1',expectedDate:document.getElementById('fExpectedDate').value,
    businessBackground:bg,userStory:us,expectedValue:ev,
    iterationType:'sub',iterationNote:'',
    created:today(),updated:today(),comments:[],
    history:[{time:now(),action:'创建子需求',user:assignee||'张架构'}]
  };
  var parentIdx=demands.findIndex(function(d){return d.id===parentId;});
  demands.splice(parentIdx+siblings.length+1,0,newDemand);
  expandedParents[parentId]=true;
  toast(newId+' 子需求已创建','success');
  closeModal();applyFilters();
}

function saveDemand(){
  var t=document.getElementById('fTitle').value.trim();if(!t){alert('请输入需求标题');return;}
  var bg=document.getElementById('fBusinessBackground').value.trim();if(!bg){alert('请输入业务背景');return;}
  var us=document.getElementById('fUserStory').value.trim();if(!us){alert('请输入用户故事');return;}
  var ev=document.getElementById('fExpectedValue').value.trim();if(!ev){alert('请输入预期价值');return;}
  var assignee=document.getElementById('fAssignee').value;
  var type=document.getElementById('fType').value;
  var iterationType=document.getElementById('fIterationType').value;
  var parentId=document.getElementById('fParentId').value.trim();
  var iterationNote=document.getElementById('fIterationNote').value.trim();
  if(parentId&&iterationType!='new'){if(!checkParentDemandExists(parentId))return;}
  if(editingId){
    for(var i=0;i<demands.length;i++){
      if(demands[i].id===editingId){
        var oldStatus=demands[i].status;
        var newStatus=document.getElementById('fStatus').value;
        demands[i].title=t;demands[i].type=type;demands[i].priority=document.getElementById('fPriority').value;
        demands[i].domain=document.getElementById('fDomain').value;demands[i].assignee=assignee;demands[i].status=newStatus;
        demands[i].source=document.getElementById('fSource').value;
        demands[i].expectedDate=document.getElementById('fExpectedDate').value;
        demands[i].businessBackground=bg;demands[i].userStory=us;demands[i].expectedValue=ev;
        demands[i].estHours=parseInt(document.getElementById('fHours').value)||0;
        demands[i].acceptance=document.getElementById('fAcceptance').value;demands[i].desc=document.getElementById('fDesc').value;
        demands[i].iterationType=iterationType;demands[i].parentId=parentId;demands[i].iterationNote=iterationNote;
        demands[i].version=generateVersion(parentId,iterationType);
        demands[i].designLink=document.getElementById('fDesignLink').value.trim();
        demands[i].devLink=document.getElementById('fDevLink').value.trim();
        demands[i].testLink=document.getElementById('fTestLink').value.trim();
        demands[i].releaseLink=document.getElementById('fReleaseLink').value.trim();
        demands[i].updated=today();
        var rName=document.getElementById('fReporterName');
        if(rName){
          var rUnit=document.getElementById('fReporterUnit');
          var rDept=document.getElementById('fReporterDept');
          demands[i].reporter={name:rName.value.trim()||assignee,unit:rUnit?rUnit.value.trim():'',dept:rDept?rDept.value.trim():''};
        }
        if(oldStatus!==newStatus&&demands[i].history){demands[i].history.push({time:now(),action:'变更为'+newStatus,user:assignee});}
        break;
      }
    }

function switchTab(el){
  var tabs=el.parentElement.querySelectorAll('.tab');
  var idx=0;for(var i=0;i<tabs.length;i++){tabs[i].classList.toggle('active',tabs[i]===el);if(tabs[i]===el)idx=i;}
  var contents=el.closest('.detail-panel').querySelectorAll('.tab-content');
  for(var i=0;i<contents.length;i++)contents[i].classList.toggle('active',i===idx);
  var panel=el.closest('.detail-panel');
  if(panel){
    panel.style.maxHeight=(window.innerHeight-120)+'px';
  }
}

function triggerDuplicateCheck(query){
  var panel=document.getElementById('duplicatePanel');
  if(!query||query.length<2){if(panel)panel.style.display='none';return;}
  var matches=[];
  var keywords=query.trim().split(/\s+/);
  for(var i=0;i<demands.length;i++){
    var d=demands[i];
    var score=0;
    for(var j=0;j<keywords.length;j++){
      if(d.title.indexOf(keywords[j])!==-1)score+=20;
      if(d.desc&&d.desc.indexOf(keywords[j])!==-1)score+=10;
    }
    if(score>0){matches.push({demand:d,score:score});}
  }
  matches.sort(function(a,b){return b.score-a.score;});
  if(matches.length===0){if(panel)panel.style.display='none';return;}
  showDuplicatePanel(matches.slice(0,5),query);
}

function showDuplicatePanel(matches,query){
  var panel=document.getElementById('duplicatePanel');
  if(!panel)return;
  var h='<div style="font-weight:600;color:#FAAD14;margin-bottom:8px"><i class="fa-solid fa-triangle-exclamation"></i> 发现'+matches.length+'条相似需求</div>';
  for(var i=0;i<matches.length;i++){
    var m=matches[i];
    var canCreateIteration=(m.demand.status==='已上线');
    h+='<div style="padding:8px;margin-bottom:4px;background:#fff;border-radius:6px;border:1px solid #F0F0F0">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:500;cursor:pointer" onclick="viewDuplicate(\''+m.demand.id+'\')">'+m.demand.id+'</span><span style="font-size:10px;color:#FAAD14">相似度'+m.score+'%</span></div>';
    h+='<div style="font-size:12px;color:#333;margin-top:4px;cursor:pointer" onclick="viewDuplicate(\''+m.demand.id+'\')">'+m.demand.title+'</div>';
    h+='<div style="font-size:11px;color:#999">状态：'+badge(sColors,m.demand.status)+' · '+m.demand.type+' · '+m.demand.created+'</div>';
    if(canCreateIteration){
      h+='<div style="margin-top:6px"><button class="btn btn-sm" style="background:#4A7DE0;color:#fff;border:none;padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer" onclick="createIteration(\''+m.demand.id+'\')"><i class="fa-solid fa-code-branch"></i> 基于此需求创建迭代</button></div>';
    }else{
      h+='<div style="margin-top:6px;font-size:11px;color:#999"><i class="fa-solid fa-circle-info"></i> 该需求未上线，暂不能创建迭代</div>';
    }
    h+='</div>';
  }
  h+='<div style="margin-top:8px;font-size:12px;color:#999">点击查看详情，或继续新建</div>';
  panel.innerHTML=h;

  if(t==='场景'){
    h+='<div class="form-section"><div class="form-section-title"><i class="fa-solid fa-users" style="color:var(--brand)"></i>场景信息</div>';
    h+='<div class="form-group"><label>用户角色</label><input type="text" class="input" id="fRole" name="role" placeholder="例如：业务分析师、项目经理"></div>';
    h+='<div class="form-group"><label>使用场景</label><textarea id="fScenario" name="scenario" style="height:64px" placeholder="描述用户在什么场景下使用..."></textarea></div>';
    h+='</div>';
  }else if(t==='模块'){
    h+='<div class="form-section"><div class="form-section-title"><i class="fa-solid fa-cube" style="color:oklch(45% 0.22 290)"></i>模块信息</div>';
    h+='<div class="form-group"><label>模块范围</label><textarea id="fScope" name="scope" style="height:64px" placeholder="描述该模块的功能范围和边界..."></textarea></div>';
    h+='<div class="form-group"><label>依赖关系</label><input type="text" class="input" id="fDependencies" name="dependencies" placeholder="依赖的其他模块或系统"></div>';
    h+='</div>';
  }else if(t==='组件'){
    h+='<div class="form-section"><div class="form-section-title"><i class="fa-solid fa-puzzle-piece" style="color:oklch(55% 0.10 185)"></i>组件信息</div>';
    h+='<div class="form-group"><label>组件类型</label><select class="filter-select" id="fComponentType" name="componentType"><option>UI组件</option><option>业务组件</option><option>技术组件</option><option>数据组件</option></select></div>';
    h+='<div class="form-group"><label>复用范围</label><textarea id="fReuseScope" name="reuseScope" style="height:56px" placeholder="描述该组件可被哪些业务域复用..."></textarea></div>';
    h+='</div>';
  }else if(t==='数据服务'){
    h+='<div class="form-section"><div class="form-section-title"><i class="fa-solid fa-database" style="color:var(--amber)"></i>数据服务信息</div>';
    h+='<div class="form-group"><label>数据源</label><input type="text" class="input" id="fDataSource" name="dataSource" placeholder="数据来源系统或表"></div>';
    h+='<div class="form-group"><label>数据范围</label><textarea id="fDataScope" name="dataScope" style="height:56px" placeholder="描述数据覆盖的范围和周期..."></textarea></div>';
    h+='</div>';
  }else if(t==='模型服务'){
    h+='<div class="form-section"><div class="form-section-title"><i class="fa-solid fa-brain" style="color:var(--success)"></i>模型服务信息</div>';
    h+='<div class="form-group"><label>模型类型</label><select class="filter-select" id="fModelType" name="modelType"><option>预测模型</option><option>分类模型</option><option>推荐模型</option><option>优化模型</option></select></div>';
    h+='<div class="form-group"><label>模型说明</label><textarea id="fModelDesc" name="modelDesc" style="height:56px" placeholder="描述模型算法、输入输出..."></textarea></div>';
    h+='</div>';
  }
  c.innerHTML=h;
}

function toggleParentField(){
  var t=document.getElementById('fIterationType').value;
  var p=document.getElementById('parentField');
  if(p)p.style.display=(t==='minor'||t==='major')?'block':'none';
}

function generateVersion(parentId,iterationType){
  if(!parentId||iterationType==='new')return'V1.0';
  var parent=demands.find(function(d){return d.id===parentId;});
  if(!parent)return'V1.0';
  var current=parent.version||'V1.0';
  var major=parseInt(current.substring(1).split('.')[0]);
  var minor=parseInt(current.substring(1).split('.')[1]||0);
  if(iterationType==='major')return'V'+(major+1)+'.0';
  return'V'+major+'.'+(minor+1);
}

function checkParentDemandExists(id){
  var exists=demands.some(function(d){return d.id===id;});
  if(!exists){alert('父需求不存在：'+id);return false;}
  return true;
}

function exportData(){
  var csv='\uFEFF编号,标题,类型,业务域,优先级,状态,负责人,工时,日期\n';
  for(var i=0;i<filtered.length;i++){var x=filtered[i];csv+=x.id+','+x.title+','+x.type+','+x.domain+','+x.priority+','+x.status+','+x.assignee+','+(x.estHours||0)+','+x.created+'\n';}
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='需求台账_'+new Date().toISOString().split('T')[0]+'.csv';a.click();URL.revokeObjectURL(a.href);
  toast('已导出 '+filtered.length+' 条','success');
}

function resetFilters(){
  document.getElementById('filterType').value='';document.getElementById('filterDomain').value='';document.getElementById('filterStatus').value='';
  document.getElementById('filterPriority').value='';document.getElementById('filterSearch').value='';
  currentPage=1;applyFilters();toast('已重置','info');
}

// ===== 初始化 =====
initExpandState();
applyFilters();

// 从发布流程回读需求状态更新
var updates = Scaffold.getDemandStatusUpdates();
if (updates) {
  var hasUpdates = false;
  Object.keys(updates).forEach(function(demandId) {
    var u = updates[demandId];
    var target = demands.find(function(d) { return d.id === demandId; });
    if (target) {
      target.status = u.status || '已上线';
      target.version = u.version || target.version;
      if (!target.history) target.history = [];
      target.history.push({time: u.updatedAt || now(), action: '发布上线', user: '系统'});
      hasUpdates = true;
    }
  });
  if (hasUpdates) {
    setTimeout(function(){ applyFilters(); toast('已应用发布流程中的需求状态更新', 'success'); }, 300);
  }
}

// 检查来自评审管理的状态更新
try {
  var updateRaw = localStorage.getItem('demand_status_update');
  if (updateRaw) {
    var update = JSON.parse(updateRaw);
    localStorage.removeItem('demand_status_update');
    var target = demands.find(function(d){ return d.id === update.demandId; });
    if (target && target.status !== update.newStatus) {
      target.status = update.newStatus;
      if (!target.history) target.history = [];
      target.history.push({time: update.timestamp, action: '评审通过', user: '系统'});
      setTimeout(function(){ applyFilters(); toast('需求 ' + update.demandId + ' 状态已自动更新为「' + update.newStatus + '」', 'success'); }, 300);
    }
  }
} catch(e) {}

// 脚手架初始化：渲染侧边栏和面包屑（自动生成 group→subgroup→item 三级分级）
Scaffold.init('demand');
</script>
